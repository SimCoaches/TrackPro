[logging]
# Set log levels for specific modules
# Valid levels: DEBUG, INFO, WARNING, ERROR, CRITICAL

# General TrackPro logging
trackpro = INFO

# ABS/threshold assist functionality removed

# Race coach and telemetry (set to DEBUG for detailed diagnostics)
trackpro.race_coach = INFO
trackpro.race_coach.ui = ERROR
trackpro.race_coach.telemetry = ERROR

# Hardware input
trackpro.pedals = INFO

# ABS controller settings removed

[telemetry]
# Telemetry debugging options
log_missing_channels = true
log_connection_status = true 