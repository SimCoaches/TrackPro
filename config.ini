# ================================================================================================
# TRACKPRO CONFIGURATION FILE
# Comprehensive settings for all TrackPro features
# ================================================================================================

[DEFAULT]
# Application metadata
app_name = TrackPro
version = 1.5.2
log_level = INFO

# ================================================================================================
# TWILIO CONFIGURATION - SMS-based Two-Factor Authentication
# ================================================================================================
[twilio]
# Twilio Account SID (get from Twilio Console)
account_sid = AC4dc59a9bdfa4d0e4762f1a144fa092dc

# Twilio Auth Token (get from Twilio Console)  
auth_token = 81d35acea67eb1785f09275844755630

# Twilio Verify Service SID (create in Twilio Console under Verify services)
verify_service_sid = VA0902e0c052f12e15d0abb402a4666fdc

# SMS timeout in seconds (default: 300 = 5 minutes)
sms_timeout = 300

# Max verification attempts before lockout
max_attempts = 3

# ================================================================================================
# SUPABASE CONFIGURATION - Cloud Database & Authentication
# ================================================================================================

[logging]
# Set log levels for specific modules
# Valid levels: DEBUG, INFO, WARNING, ERROR, CRITICAL

# General TrackPro logging
trackpro = INFO

# ABS/threshold assist functionality removed

# Race coach and telemetry (set to DEBUG for detailed diagnostics)
trackpro.race_coach = DEBUG
trackpro.race_coach.ui = INFO
trackpro.race_coach.telemetry = INFO
trackpro.race_coach.ai_coach = DEBUG

# Hardware input
trackpro.pedals = INFO

# ABS controller settings removed

[telemetry]
# Telemetry debugging options
log_missing_channels = true
log_connection_status = true 